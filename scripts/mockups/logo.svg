<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0d1926" stroke="#1a8a4a" stroke-width="3"/>

  <!-- Roulette tick marks -->
  <g stroke="#1a8a4a" stroke-width="2.5" opacity="0.35">
    <line x1="100" y1="10" x2="100" y2="25"/>
    <line x1="100" y1="175" x2="100" y2="190"/>
    <line x1="10" y1="100" x2="25" y2="100"/>
    <line x1="175" y1="100" x2="190" y2="100"/>
    <line x1="36.4" y1="36.4" x2="47" y2="47"/>
    <line x1="153" y1="153" x2="163.6" y2="163.6"/>
    <line x1="163.6" y1="36.4" x2="153" y2="47"/>
    <line x1="47" y1="153" x2="36.4" y2="163.6"/>
  </g>

  <!-- Inner ring -->
  <circle cx="100" cy="100" r="72" fill="none" stroke="#1a8a4a" stroke-width="1" opacity="0.2"/>

  <!-- Big leaf -->
  <g transform="translate(100,85)">
    <path d="M0,-58 C36,-48 60,-24 60,16 C60,52 30,70 0,78 C-30,70 -60,52 -60,16 C-60,-24 -36,-48 0,-58Z"
          fill="#1a8a4a" opacity="0.9"/>
    <!-- Veins -->
    <line x1="0" y1="-50" x2="0" y2="72" stroke="#14703c" stroke-width="2.5" opacity="0.45"/>
    <line x1="0" y1="-22" x2="26" y2="-8" stroke="#14703c" stroke-width="1.5" opacity="0.35"/>
    <line x1="0" y1="-2" x2="-26" y2="12" stroke="#14703c" stroke-width="1.5" opacity="0.35"/>
    <line x1="0" y1="18" x2="24" y2="32" stroke="#14703c" stroke-width="1.5" opacity="0.35"/>
    <line x1="0" y1="38" x2="-22" y2="50" stroke="#14703c" stroke-width="1.5" opacity="0.35"/>
  </g>

  <!-- ? mark — clean sans-serif, white -->
  <text x="100" y="110" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="500" fill="white" opacity="0.95">?</text>

  <!-- Stem -->
  <line x1="100" y1="163" x2="100" y2="176" stroke="#1a8a4a" stroke-width="2.5" stroke-linecap="round" opacity="0.45"/>
</svg>
