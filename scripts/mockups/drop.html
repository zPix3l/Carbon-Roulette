<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #17212b; font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; padding: 0; }
.header { background: #242f3d; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
.avatar { width: 40px; height: 40px; border-radius: 50%; background: #3a9d5c; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.chat-name { font-size: 15px; font-weight: 600; color: #fff; }
.chat-sub { font-size: 12px; color: #6d7f8f; }
.chat { padding: 14px 12px 24px; }
.msg { background: #182533; border-radius: 4px 14px 14px 14px; padding: 10px 14px; max-width: 360px; font-size: 15px; line-height: 1.5; color: #e4e6ea; }
.msg .sender { font-size: 13px; font-weight: 600; color: #5b9bd5; margin-bottom: 4px; }
.msg pre { font-family: inherit; white-space: pre-wrap; margin: 0; }
.msg .time { font-size: 11px; color: #6d7f8f; text-align: right; margin-top: 6px; }
.buttons { display: flex; gap: 4px; margin-top: 8px; }
.buttons .btn { flex: 1; border: 1px solid #3a4a5c; border-radius: 8px; color: #5b9bd5; padding: 10px; font-size: 14px; font-weight: 600; text-align: center; background: none; }
</style></head>
<body>
<div class="header">
  <div class="avatar">🌍</div>
  <div><div class="chat-name">BigWater 💧 Protocol | Community</div><div class="chat-sub">7 738 members, 39 online</div></div>
</div>
<div class="chat">
  <div class="msg">
    <div class="sender">Carbon Roulette</div>
    <pre>🌊 round 5/30

a mangrove / blue carbon restoration project in Pakistan just hit the market.
$14.72 per tonne. 285,332 credits.

clean deal or red flags?

🔍 3 investigators</pre>
    <div class="buttons">
      <div class="btn">🔍 INVESTIGATE</div>
      <div class="btn">📚 LEARN</div>
    </div>
    <div class="time">14:32</div>
  </div>
</div>
</body></html>
